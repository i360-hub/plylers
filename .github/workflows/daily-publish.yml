# Daily scheduled rebuild + deploy — makes future-dated blog posts go live
# automatically on their pubDate (see src/lib/posts.ts for the date gate).
#
# Why GitHub Actions and not a Cloudflare Deploy Hook + cron Worker: the Pages
# project (plylers-tree-service-staging) is a DIRECT-UPLOAD project deployed via
# `wrangler pages deploy dist` — it is not git-connected, so Cloudflare has no
# build to trigger and Deploy Hooks don't exist for it.
#
# ⚠️ This deploys whatever is on GitHub `main`. Local work must be pushed before
# 11:00 UTC or the nightly deploy will ship an older tree than the last manual
# `wrangler pages deploy` from the Mac. Push and deploy together.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — from the Cloudflare dashboard right sidebar
name: daily-blog-publish

on:
  schedule:
    - cron: '0 11 * * *' # 11:00 UTC = 6:00 AM Central (CDT)
  workflow_dispatch: # manual "Run workflow" button for testing / off-schedule publishes

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # `npm run build` uses `astro build --force` (content-layer cache bust) so
      # the pubDate gate and the unpublished-link gate are always evaluated fresh.
      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=plylers-tree-service-staging --branch=main
